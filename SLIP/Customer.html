<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <title>લાઈવ સ્ટેટસ - જાંગિડ ઓનલાઇન સર્વિસીસ</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f4f8; padding: 20px; text-align: center; }
        .status-box { max-width: 450px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: 100px auto; }
        h2 { color: #1e3a8a; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; box-sizing: border-box; border: 2px solid #ccc; border-radius: 6px; font-size: 16px; margin-bottom: 15px; text-align: center; text-transform: uppercase; }
        button { background-color: #1e3a8a; color: white; padding: 12px; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; width: 100%; font-weight: bold; }
        #result { margin-top: 25px; padding: 15px; border-radius: 6px; display: none; text-align: left; line-height: 1.6; }
        .status-Pending { background-color: #fef3c7; color: #92400e; border-left: 5px solid #d97706; }
        .status-Confirm { background-color: #d1fae5; color: #065f46; border-left: 5px solid #059669; }
        .status-Reject { background-color: #fee2e2; color: #991b1b; border-left: 5px solid #dc2626; }
    </style>
</head>
<body>

<div class="status-box">
    <h2>લાઈવ કામનું સ્ટેટસ ચેક કરો</h2>
    <p style="color: #666; font-size: 14px;">તમારી પાવતી પરનો પહોંચ નંબર લખો (દા.ત. JOS001)</p>
    <input type="text" id="receiptInput" placeholder="પહોંચ નંબર લખો...">
    <button onclick="searchStatus()">સ્ટેટસ જુઓ</button>
    <div id="result"></div>
</div>

<script>
    // 🚨 અહીં પણ તમારી ગૂગલ એપ્સ સ્ક્રિપ્ટની સાચી વેબ એપ લિંક પેસ્ટ કરો
    const scriptUrl = "https://script.google.com/macros/s/AKfycbysh0pM8BjrO0TSUT0OaqHK22ArME4G_sH7Udqe-adlPwg8MeiIDK2gMr59nJQK-HUDkg/exec";

    function searchStatus() {
        var id = document.getElementById("receiptInput").value;
        if(!id) { alert("નંબર લખો!"); return; }
        var resDiv = document.getElementById("result");
        resDiv.innerHTML = "<b>શોધી રહ્યું છે...</b>"; resDiv.style.display = "block";
        
        fetch(scriptUrl, { method: "POST", headers: { "Content-Type": "text/plain" }, body: JSON.stringify({ action: "checkStatus", receiptNo: id }) })
        .then(r => r.json()).then(res => {
            if(res.found) {
                resDiv.className = "status-" + res.workStatus;
                var html = "<h3>કામની વિગત:</h3><p><b>નામ:</b> " + res.name + "</p><p><b>સેવા:</b> " + res.service + "</p><p><b>સ્ટેટસ:</b> <span style='font-weight:bold; font-size:18px;'> " + res.workStatus + "</span></p>";
                if(res.workStatus === "Confirm") html += "<p><b>કન્ફર્મ વિગત:</b> " + res.extra + "</p>";
                else if(res.workStatus === "Reject") html += "<p style='color:#dc2626;'><b>કારણ:</b> " + res.extra + "</p>";
                resDiv.innerHTML = html;
            } else { resDiv.className = ""; resDiv.innerHTML = "<b style='color:#dc2626;'>ભૂલ:</b> આ નંબર મળ્યો નથી."; }
        });
    }
</script>
</body>
</html>
