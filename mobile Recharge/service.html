<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Services</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="logo.png">

<style>
/* ===== RESET ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #f4f6f9;
}

/* ===== NAVBAR ===== */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #2c3e50;
  padding: 10px 20px;
  color: #fff;
}

.nav-left {
  display: flex;
  gap: 20px;
}

.nav-left li {
  list-style: none;
}

.nav-left a {
  text-decoration: none;
  color: #fff;
  font-weight: bold;
  transition: color 0.3s;
}

.nav-left a:hover {
  color: #1abc9c;
}

/* ===== USER DROPDOWN ===== */
.nav-right {
  position: relative;
}

.user-btn {
  background: none;
  border: none;
  color: #fff;
  font-size: 16px;
  cursor: pointer;
}

.dropdown {
  display: none;
  position: absolute;
  right: 0;
  top: 40px;
  background: #fff;
  color: #333;
  border-radius: 6px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  min-width: 130px;
  z-index: 100;
}

.dropdown a {
  display: block;
  padding: 10px;
  text-decoration: none;
  color: #333;
}

.dropdown a:hover {
  background: #f1f1f1;
}

/* ===== PAGE CONTAINER ===== */
.container {
  padding: 30px;
}

.container h1 {
  text-align: center;
  margin-bottom: 30px;
  color: #2c3e50;
}

/* ===== SERVICE BOXES ===== */
.services {
  display: flex;
  gap: 20px;
}

.service-box {
  flex: 1;
  background: #fff;
  padding: 25px;
  border-radius: 12px;
  text-align: center;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.service-box:hover {
  transform: translateY(-6px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.service-box h3 {
  margin-bottom: 15px;
  color: #2c3e50;
}

/* ===== BUTTON ===== */
.service-box button {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background: #1abc9c;
  color: #fff;
  font-size: 15px;
  cursor: pointer;
  transition: background 0.3s;
}

.service-box button:hover {
  background: #16a085;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .services {
    flex-direction: column;
  }
}

</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar">
  <ul class="nav-left">
    <li><a href="dashboard.html">Home</a></li>
    <li><a href="service.html">Service</a></li>
    <li><a href="history.html">History</a></li>
  </ul>

  <div class="nav-right">
    <button class="user-btn" id="userBtn">UserID ▼</button>
    <div class="dropdown" id="dropdownMenu">
      <a href="#" id="logout">Logout</a>
    </div>
  </div>
</nav>


<!-- Services -->
<div class="container">
  <h1>Our Services</h1>

  <div class="services">
    <div class="service-box">
      <h3>📱 Mobile Recharge</h3>
      <button onclick="openMobile()">Click Here</button>
    </div>

    <div class="service-box">
      <h3>💡 Electricity Bill</h3>
      <button onclick="openElectricity()">Click Here</button>
    </div>

    <div class="service-box">
      <h3>🔥 Gas Bill</h3>
      <button onclick="openGas()">Click Here</button>
    </div>


    <div class="service-box">
      <h3>➕ More Services</h3>
      <button onclick="alert('Coming Soon 🚀')">Click Here</button>
    </div>
  </div>
</div>


<script>
// function openMobile() {
//   window.open(
//     "https://docs.google.com/forms/d/e/1FAIpQLSfJOv9OeIclcWb9dtApwx4pIqOq3JM0aWlVcvB4aCqJx3ANOQ/viewform?usp=dialog",
//     "_blank"
//   );
// }

// function openElectricity() {
//   window.open(
//     "https://docs.google.com/forms/d/e/1FAIpQLSeAuvwMjKpfkJseIGudYOCHZs4Zesf_lAmR0fZ5D30e8C4iWQ/viewform?usp=dialog",
//     "_blank"
//   );
//   // alert("Electricity bill service coming soon ⚡");
// }

  /* ===== LOGIN CHECK ===== */
  const userid = localStorage.getItem("userid");
  const email = localStorage.getItem("email");

  if (!userid || !email) {
    alert("Session expired. Please login again.");
    window.location.href = "index.html";
  }

  /* ===== USER DROPDOWN ===== */
  const userBtn = document.getElementById("userBtn");
  const dropdownMenu = document.getElementById("dropdownMenu");
  const logout = document.getElementById("logout");

  userBtn.textContent = userid + " ▼";

  userBtn.addEventListener("click", () => {
    dropdownMenu.style.display =
      dropdownMenu.style.display === "block" ? "none" : "block";
  });

  logout.addEventListener("click", (e) => {
    e.preventDefault();
    alert("Logged out successfully!");
    localStorage.clear();
    window.location.href = "index.html";
  });

  window.addEventListener("click", (e) => {
    if (!userBtn.contains(e.target) && !dropdownMenu.contains(e.target)) {
      dropdownMenu.style.display = "none";
    }
  });

  /* ===== AUTO LOGOUT (INACTIVITY) ===== */
  let logoutTimer;

  function resetTimer() {
    clearTimeout(logoutTimer);
    logoutTimer = setTimeout(autoLogout, 60000); // 1 minute (change if needed)
  }

  function autoLogout() {
    alert("You have been logged out due to inactivity.");
    localStorage.clear();
    window.location.href = "index.html";
  }

  window.onload = resetTimer;
  document.onmousemove = resetTimer;
  document.onkeypress = resetTimer;
  document.onclick = resetTimer;
  document.onscroll = resetTimer;

function openMobile() {
  if (hasPermission("mobile")) {
  window.open(
    "https://docs.google.com/forms/d/e/1FAIpQLSfJOv9OeIclcWb9dtApwx4pIqOq3JM0aWlVcvB4aCqJx3ANOQ/viewform?usp=dialog",
    "_blank"
  );
}
}

function openElectricity() {
  if (hasPermission("electricity")) {
  window.open(
    "https://docs.google.com/forms/d/e/1FAIpQLSeAuvwMjKpfkJseIGudYOCHZs4Zesf_lAmR0fZ5D30e8C4iWQ/viewform?usp=dialog",
    "_blank"
  );
  // alert("Electricity bill service coming soon ⚡");
}
}

function openGas() {
  if (hasPermission("gas")) {
  window.open(
    "https://docs.google.com/forms/d/e/1FAIpQLSefk6PRFkdbN2ueEaQpWhKrEOcSw4i99OyYcxldJK3KMROBYg/viewform?usp=dialog",
    "_blank"
  );
  // alert("Gas bill service coming soon ⚡");
}
}

function hasPermission(serviceName) {
  const permissions = JSON.parse(localStorage.getItem("permissions") || "[]");
  if (permissions.includes(serviceName)) {
    return true;
  } else {
    alert("⛔ Access Denied: You are not eligible for " + serviceName);
    return false;
  }
}

</script>

</body>
</html>
