<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="logo.png">
  <title>JOS</title>
  <style>
   body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f9;
  /* Prevents the whole page from "wobbling" horizontally */
  overflow-x: hidden; 
  width: 100%;
}

.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #2c3e50;
  padding: 10px 20px;
  color: #fff;
  /* Fix: Ensures background covers the full width regardless of padding */
  width: 100%;
  box-sizing: border-box; 
  position: relative;
  z-index: 1001;
}

.nav-left {
  display: flex;
  gap: 15px; /* Slightly reduced gap for better mobile fit */
  list-style: none;
  padding: 0;
  margin: 0;
  align-items: center;
  /* Fix: Allows menu items to wrap to a second line if the screen is too narrow */
  flex-wrap: wrap; 
}

.nav-left li { 
  list-style: none; 
}

/* Ensure the body doesn't cause weird horizontal gaps */

    .nav-left a {
      text-decoration: none;
      color: #fff;
      font-weight: bold;
      transition: color 0.3s;
    }
    .nav-left a:hover { color: #1abc9c; }

    .nav-right { position: relative; }
    .user-btn {
      background: none;
      border: none;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }

    /* Dashboard content */
    .content {
      padding: 20px;
    }

    /* Summary boxes */
    .summary {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }
    .box {
      flex: 1;
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
      transition: transform 0.3s ease;
    }
    .box:hover { transform: translateY(-5px); }
    .box h3 {
      margin-bottom: 10px;
      color: #2c3e50;
    }
    .box p {
      font-size: 24px;
      font-weight: bold;
      color: #1abc9c;
    }

    /* Service Section */
.service-section {
  display: none;
  margin-top: 40px;
}

.service-section h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #2c3e50;
}

.service-boxes {
  display: flex;
  gap: 20px;
}

.service-box {
  flex: 1;
  background: #fff;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
  text-align: center;
  transition: transform 0.3s;
}

.service-box:hover {
  transform: translateY(-6px);
}

.service-box h3 {
  margin-bottom: 15px;
}

.service-box button {
  padding: 10px 18px;
  border: none;
  border-radius: 8px;
  background: #1abc9c;
  color: #fff;
  font-size: 15px;
  cursor: pointer;
}

.service-box button:hover {
  background: #16a085;
}

/* Service Dropdown */
.service-select select {
  width: 100%;
  padding: 12px 40px 12px 14px;
  border-radius: 10px;
  border: 1px solid #dcdfe6;
  background: #ffffff;
  font-size: 15px;
  font-weight: 600;
  color: #2c3e50;
  appearance: none;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  transition: all 0.25s ease;
}

.service-select select:hover {
  border-color: #1abc9c;
}

.service-select select:focus {
  outline: none;
  border-color: #1abc9c;
  box-shadow: 0 0 0 3px rgba(26,188,156,0.25);
}

/* Arrow */
.service-select .select-arrow {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
  font-size: 16px;
  color: #1abc9c;
}

/* Dropdown Container */
.dropdown {
  display: none;
  position: absolute;
  background-color: #2c3e50;
  min-width: 160px;
  box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
  z-index: 1000;
  border-radius: 4px;
  top: 100%; /* Positions it right below the nav item */
  left: 0;
}

/* Dropdown Links */
.dropdown a {
  color: white;
  padding: 12px 16px;
  text-decoration: none;
  display: block;
  font-size: 14px;
}

.dropdown a:hover {
  background-color: #1abc9c;
  color: black;
}

/* Show class for JS */
.show {
  display: block;
}

@media (max-width: 600px) {
  .summary {
    flex-direction: column;
  }
  .navbar {
    padding: 15px 10px;
  }
  
  .nav-left {
    justify-content: center; /* Centers links on mobile */
    font-size: 13px; /* Slightly smaller text for better fit */
    gap: 10px;
  }
}

  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <ul class="nav-left">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="service.html">Service</a></li>
      <li><a href="history.html">History</a></li>
      <li><a href="commission.html">Commission</a></li>
      <li style="position: relative;">
    <a href="javascript:void(0)" id="otherBtn">Other ▼</a>
    <div class="dropdown" id="otherMenu">
      <a href="payout.html">Payout</a>
      <a href="check-mrc.html">Check MRC</a>
      <a href="#" onclick="alert('Support: Contact Admin')">Complain</a>
    </div>
  </li>
    </ul>


    <div class="nav-right">
      <button class="user-btn" id="userBtn">UserID ▼</button>
      <div class="dropdown" id="dropdownMenu">
        <a href="#" id="logout">Logout</a>
      </div>
    </div>
  </nav>

  <!-- Dashboard content -->
  <div class="content">
    <h1>Welcome to Dashboard</h1>

    <div class="filter-bar" style="display:flex; justify-content:flex-end; margin:15px 0;">
  <div class="service-select" style="position:relative; width:220px;">
    <select id="serviceFilter">
      <option value="mobile" selected>📱 Mobile Recharge</option>
      <option value="electricity">💡 Electricity Bill</option>
      <option value="gas">🔥 Gas Bill</option> </select>
    </select>
    <span class="select-arrow">▾</span>
  </div>
</div>


    <div class="summary">
      <div class="box">
  <h3 id="boxTitle1">Total Recharges/Bill</h3>
  <p id="totalRecharges">0</p>
</div>

<div class="box">
  <h3 id="boxTitle2">Total Amount Paid</h3>
  <p id="totalAmount">₹0</p>
</div>

<div class="box">
  <h3 id="boxTitle3">Total Commission</h3>
  <p id="totalCommission">₹0</p>
</div>

    </div>

    <!-- Service Section -->
<div id="serviceSection" class="service-section">
  <h2>Our Services</h2>

  <div class="service-boxes">
    <div class="service-box">
      <h3>📱 Mobile Recharge</h3>
      <button onclick="openMobileRecharge()">Click Here</button>
    </div>

    <div class="service-box">
      <h3>💡 Electricity Bill</h3>
      <button onclick="openElectricity()">Click Here</button>
    </div>

    <div class="service-box">
      <h3>➕ More Services</h3>
      <button onclick="alert('Coming Soon')">Click Here</button>
    </div>
  </div>
</div>

  </div>

  <script>

    const MOBILE_SHEET_URL =
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vSf0j2Snp-gSwlYj_agvVS07rusqd2hROFo-bSWkCDvcvFpbGRSNl6GbAsAL8o5t4XTpkJn8ZwHzAxm/pub?output=csv";

    const ELECTRICITY_SHEET_URL =
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vSD11VkzbcX9lNhSnKm_tgXFJl6KjeSLXRUrvZkxcCRsTWBXEmc6PjWH-RHK1n2dGi_3FGPxjbcjVNc/pub?gid=0&single=true&output=csv";

  const GAS_SHEET_URL =
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vSZRvHJZmcUja2_rLURbglTL735MKZNOf3HUUwamfALw3LxpYU-4LXCPDlNkT2xCOmVKC0Buq3dM7sZ/pub?output=csv";


    const userBtn = document.getElementById("userBtn");
    const dropdownMenu = document.getElementById("dropdownMenu");
    const logout = document.getElementById("logout");

    userBtn.addEventListener("click", () => {
      dropdownMenu.style.display = dropdownMenu.style.display === "block" ? "none" : "block";
    });

    logout.addEventListener("click", (e) => {
      e.preventDefault();
      alert("Logged out successfully!");
      window.location.href = "index.html";
    });

    window.addEventListener("click", (e) => {
      if (!userBtn.contains(e.target) && !dropdownMenu.contains(e.target)) {
        dropdownMenu.style.display = "none";
      }
    });

    const userid = localStorage.getItem("userid");
    const email = localStorage.getItem("email"); // email saved at login

    if(userid) {
      document.getElementById("userBtn").textContent = userid + " ▼";
    } else {
      localStorage.removeItem("userid");
      window.location.href = "index.html";
    }

    // Auto logout after inactivity
    let logoutTimer;
    function resetTimer() {
      clearTimeout(logoutTimer);
      logoutTimer = setTimeout(autoLogout, 60000); // 5 minutes
    }
    function autoLogout() {
      alert("You have been logged out due to inactivity.");
      localStorage.clear();
      window.location.href = "index.html";
    }
    window.onload = resetTimer;
    document.onmousemove = resetTimer;
    document.onkeypress = resetTimer;
    document.onclick = resetTimer;
    document.onscroll = resetTimer;

    // Fetch Google Sheet data
async function fetchSummary() {
  const service =
    document.getElementById("serviceFilter")?.value || "mobile";

      const sheetUrl = (service === "gas") ? GAS_SHEET_URL : 
                       (service === "electricity") ? ELECTRICITY_SHEET_URL : MOBILE_SHEET_URL;

  const email = localStorage.getItem("email");
  const userid = localStorage.getItem("userid"); // UserID પણ મેળવો

  if (!email || !userid) return;

  const res = await fetch(sheetUrl + "&t=" + Date.now());
  const text = await res.text();

  const rows = text
    .trim()
    .split("\n")
    .map(r => r.replace(/\r/g, "").split(","));

  let totalCount = 0;
  let totalAmount = 0;
  let totalCommission = 0;

  rows.slice(1).forEach(row => {
    if (!row || row.length < 2) return;

    const rowIdentifier = (row[1] || "").trim().toLowerCase();
    
    // જો બીજી કોલમ યુઝરના ઈમેલ અથવા યુઝર આઈડી સાથે મેચ થાય તો જ ગણતરી કરો
    if (rowIdentifier === email.toLowerCase() || rowIdentifier === userid.toLowerCase()) {
      totalCount++;

    // Amount is usually the same column (Column D) for all
      const amountIndex = 
          service === "gas" ? 6 :           // Gas uses Index 10
          service === "electricity" ? 6 :   // Electricity uses Index 10
          5;                                 // Mobile uses Index 9 

    // Commission changes based on the sheet structure
      const commissionIndex = 
          service === "gas" ? 11 :           // Gas uses Index 10
          service === "electricity" ? 7 :   // Electricity uses Index 10
          7;                                 // Mobile uses Index 9

    const amount = Number(
      (row[amountIndex] || "").replace(/[₹,]/g, "")
    );
    if (!isNaN(amount)) totalAmount += amount;

    const commission = Number(
      (row[commissionIndex] || "").replace(/[₹,%]/g, "")
    );
    if (!isNaN(commission)) totalCommission += commission;
    }
  });

  // 🔁 BOX TITLES CHANGE
  if (service === "electricity") {
    document.getElementById("boxTitle1").textContent = "Total Electricity Bills";
  } else if (service === "gas") {
    document.getElementById("boxTitle1").textContent = "Total Gas Bills";
  } else {
    document.getElementById("boxTitle1").textContent = "Total Recharges";
  }

  // 🔢 VALUES UPDATE
  document.getElementById("totalRecharges").textContent = totalCount;
  document.getElementById("totalAmount").textContent = "₹" + totalAmount.toFixed(2);
  document.getElementById("totalCommission").textContent = "₹" + totalCommission.toFixed(2);
}
//  catch (err) {
//     console.error("Dashboard error:", err);
//   }

document
  .getElementById("serviceFilter")
  .addEventListener("change", fetchSummary);

fetchSummary(); // default mobile
setInterval(fetchSummary, 30000);


  function openMobileRecharge() {
    window.location.href =
      "https://docs.google.com/forms/d/e/1FAIpQLSfJOv9OeIclcWb9dtApwx4pIqOq3JM0aWlVcvB4aCqJx3ANOQ/viewform?usp=dialog";
  }

  function openElectricity() {
    window.location.href =
      "https://docs.google.com/forms/d/e/1FAIpQLSeAuvwMjKpfkJseIGudYOCHZs4Zesf_lAmR0fZ5D30e8C4iWQ/viewform?usp=dialog";
    // alert("Electricity Bill Service Coming Soon ⚡");
  }

  function hasPermission(serviceName) {
  const permissions = JSON.parse(localStorage.getItem("permissions") || "[]");
  if (permissions.includes(serviceName)) {
    return true;
  } else {
    alert("⛔ Access Denied: You are not eligible for " + serviceName);
    return false;
  }
}

// Robust Dropdown Toggle
  const otherBtn = document.getElementById("otherBtn");
  const otherMenu = document.getElementById("otherMenu");

  otherBtn.onclick = function(e) {
    e.stopPropagation();
    otherMenu.classList.toggle("show");
  };

  // Close dropdown if user clicks outside
  window.onclick = function(event) {
    if (!event.target.matches('#otherBtn')) {
      if (otherMenu.classList.contains('show')) {
        otherMenu.classList.remove('show');
      }
    }
  };

</script>

</body>
</html>
