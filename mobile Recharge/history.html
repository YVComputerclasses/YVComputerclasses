<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="logo.png">
  <title>History</title>
  <style>
    /* Updated Styles for Mobile Compatibility */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f9;
  /* Prevents the entire page from wobbling left/right */
  overflow-x: hidden; 
  width: 100%;
}

.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #2c3e50;
  padding: 10px 20px;
  color: #fff;
  /* Ensure background covers full width even with padding */
  width: 100%;
  box-sizing: border-box; 
  position: relative;
  z-index: 1001;
}

.nav-left {
  display: flex;
  gap: 15px; /* Slightly reduced gap for mobile */
  list-style: none;
  padding: 0;
  margin: 0;
  align-items: center;
  /* Allows menu items to wrap to a new line if the screen is too narrow */
  flex-wrap: wrap; 
}

    .nav-left li {
      list-style: none;
    }

    .nav-left a {
      text-decoration: none;
      color: #fff;
      font-weight: bold;
      transition: color 0.3s;
    }

    .nav-left a:hover {
      color: #1abc9c;
    }

    /* Right user menu */
    .nav-right {
      position: relative;
    }

    .user-btn {
      background: none;
      border: none;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }

    .dropdown {
      display: none;
      position: absolute;
      right: 0;
      top: 40px;
      background: #fff;
      color: #333;
      border-radius: 6px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      min-width: 120px;
      z-index: 100;
    }

    .dropdown a {
      display: block;
      padding: 10px;
      text-decoration: none;
      color: #333;
      transition: background 0.3s;
    }

    .dropdown a:hover {
      background: #f1f1f1;
    }

    /* Dashboard content */
    .content {
      padding: 20px;
    }

    h2 {
      text-align: center;
      color: #fff;
      margin-bottom: 20px;
      animation: fadeInDown 1s ease;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      animation: fadeInUp 1s ease;
    }

    thead {
      background: #2c3e50;
      color: #fff;
    }

    th, td {
      padding: 12px 15px;
      text-align: center;
    }

    tr {
      transition: background 0.3s ease;
    }

    tr:hover {
      background: #f1f9ff;
    }

    /* Animations */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }


    /* ===== FILTER BAR ===== */
.filter-bar {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 15px;
}

/* ===== CUSTOM SELECT ===== */
.service-select {
  position: relative;
  width: 220px;
  animation: slideFade 0.5s ease;
}

.service-select select {
  width: 100%;
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;

  padding: 12px 40px 12px 15px;
  border-radius: 10px;
  border: 1px solid #dcdcdc;

  background: #ffffff;
  font-size: 15px;
  font-weight: 600;
  color: #2c3e50;
  cursor: pointer;

  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
  transition: all 0.3s ease;
}

/* Hover + focus effect */
.service-select select:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 22px rgba(0,0,0,0.15);
}

.service-select select:focus {
  outline: none;
  border-color: #1abc9c;
}

/* Arrow */
.select-arrow {
  position: absolute;
  right: 15px;
  top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
  font-size: 16px;
  color: #1abc9c;
  transition: transform 0.3s ease;
}

/* Rotate arrow on focus */
.service-select select:focus + .select-arrow {
  transform: translateY(-50%) rotate(180deg);
}

/* Entry animation */
@keyframes slideFade {
  from {
    opacity: 0;
    transform: translateX(20px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

/* Mobile responsive */
@media (max-width: 600px) {
  .navbar {
    padding: 15px 10px;
    flex-direction: column; /* Optional: stacks user ID and menu */
    gap: 10px;
  }

  .nav-left {
    justify-content: center;
    font-size: 13px;
  }

  /* Ensures the table is scrollable sideways without breaking the navbar */
  #sheetData {
    width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
}

/* Dropdown Container */
.dropdown {
  display: none;
  position: absolute;
  background-color: #2c3e50;
  min-width: 160px;
  box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
  z-index: 1000;
  border-radius: 4px;
  top: 100%; /* Positions it right below the nav item */
  left: 0;
}

/* Dropdown Links */
.dropdown a {
  color: white;
  padding: 12px 16px;
  text-decoration: none;
  display: block;
  font-size: 14px;
}

.dropdown a:hover {
  background-color: #1abc9c;
  color: black;
}

/* Show class for JS */
.show {
  display: block;
}

  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
  <ul class="nav-left">
    <li><a href="dashboard.html">Dashboard</a></li>
    <li><a href="service.html">Service</a></li>
    <li><a href="history.html">History</a></li>
    <li><a href="commission.html">Commission</a></li>
    <li style="position: relative;">
    <a href="javascript:void(0)" id="otherBtn">Other ▼</a>
    <div class="dropdown" id="otherMenu">
      <a href="payout.html">Payout</a>
      <a href="check-mrc.html">Check MRC</a>
      <a href="#" onclick="alert('Support: Contact Admin')">Complain</a>
    </div>
  </li>
  </ul>

  <div class="nav-right">
    <button class="user-btn" id="userBtn">UserID ▼</button>
    <div class="dropdown" id="dropdownMenu">
      <a href="#" id="logout">Logout</a>
    </div>
  </div>
</nav>


  <!-- Dashboard content -->
  <div class="content">

    <div class="filter-bar">
  <div class="service-select">
    <select id="serviceFilter">
      <option value="mobile" selected>📱 Mobile Recharge</option>
      <option value="electricity">💡 Electricity Bill</option>
      <option value="gas">🔥 Gas Bill</option> </select>
    </select>
    <span class="select-arrow">▾</span>
  </div>
</div>


</div>

    <div id="sheetData"></div>

<script>
  const MOBILE_SHEET_URL =
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vQzdrSCbr2qf3cszQI8SE2KDeBjSi-5dzKKFD1_xemwhjbA1GpbA3eYqlASxyy1CaIY0S7v4dTHNYE5/pub?output=csv";

const ELECTRICITY_SHEET_URL =
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vSq5Aehnb_p4ZUzl1LMpV1hTerAR73VXdVr99Bzo8NnfcBEdQChxz19FfyaH5YEyiSwvjKwDZffI0IA/pub?output=csv";

  const GAS_SHEET_URL =
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vSZRvHJZmcUja2_rLURbglTL735MKZNOf3HUUwamfALw3LxpYU-4LXCPDlNkT2xCOmVKC0Buq3dM7sZ/pub?output=csv";

async function fetchData() {
  const service =
    document.getElementById("serviceFilter")?.value || "mobile";

  const sheetUrl = (service === "gas") ? GAS_SHEET_URL : 
                   (service === "electricity") ? ELECTRICITY_SHEET_URL : MOBILE_SHEET_URL;

  const email = localStorage.getItem("email");
  if (!email) {
    alert("Session expired. Please login again.");
    window.location.href = "index.html";
    return;
  }

  const response = await fetch(sheetUrl + "&t=" + Date.now());
  const csvText = await response.text();

  const rows = csvText
    .trim()
    .split("\n")
    .map(r => r.replace(/\r/g, "").split(","));

  let htmlOutput = `
    <table>
      <thead>
        <tr>
          <th>Date & Time</th>
          <th>Mobile / Account No</th>
          <th>Amount</th>
          <th>Payment Type</th>
          <th>Status</th>
          <th>Commission</th>
        </tr>
      </thead>
      <tbody>
  `;

  for (let i = 1; i < rows.length; i++) {
  const row = rows[i];
  if (!row || row.length === 0) continue;

  // user filter
  if ((row[1] || "").trim().toLowerCase() !== email.toLowerCase()) continue;

  let date, number, amount, payment, status, commission;

  if (service === "electricity") {
    // 💡 ELECTRICITY INDEXES
    date       = row[0] || "";
    number     = row[2] || ""; // account number
    amount     = row[3] || "";
    payment    = row[8] || "";
    status     = row[9] || "";
    commission = row[10] || "";
  } else if (service === "gas") { 
    // 🔥 GAS INDEXES
    date       = row[0] || "";
    number     = row[3] || ""; // account number
    amount     = row[6] || "";
    payment    = row[9] || "";
    status     = row[10] || "";
    commission = row[11] || "";

  }else {
    // 📱 MOBILE INDEXES
    date       = row[0] || "";
    number     = row[2] || ""; // mobile number
    amount     = row[3] || "";
    payment    = row[7] || "";
    status     = row[8] || "";
    commission = row[9] || "";
  }

  htmlOutput += `
    <tr>
      <td>${date}</td>
      <td>${number}</td>
      <td>${amount}</td>
      <td>${payment}</td>
      <td>${status}</td>
      <td>${commission}</td>
    </tr>
  `;
  }

  htmlOutput += "</tbody></table>";
  document.getElementById("sheetData").innerHTML = htmlOutput;
}


document
  .getElementById("serviceFilter")
  .addEventListener("change", fetchData);
  
fetchData();
setInterval(fetchData, 30000);

</script>

  </div>

  <script>
/* ===== LOGIN CHECK ===== */
const userid = localStorage.getItem("userid");
const email = localStorage.getItem("email");

if (!userid || !email) {
  alert("Session expired. Please login again.");
  window.location.href = "index.html";
}

/* ===== USER DROPDOWN ===== */
const userBtn = document.getElementById("userBtn");
const dropdownMenu = document.getElementById("dropdownMenu");
const logout = document.getElementById("logout");

userBtn.textContent = userid + " ▼";

userBtn.addEventListener("click", () => {
  dropdownMenu.style.display =
    dropdownMenu.style.display === "block" ? "none" : "block";
});

logout.addEventListener("click", (e) => {
  e.preventDefault();
  alert("Logged out successfully!");
  localStorage.clear();
  window.location.href = "index.html";
});

window.addEventListener("click", (e) => {
  if (!userBtn.contains(e.target) && !dropdownMenu.contains(e.target)) {
    dropdownMenu.style.display = "none";
  }
});

/* ===== AUTO LOGOUT (INACTIVITY) ===== */
let logoutTimer;

function resetTimer() {
  clearTimeout(logoutTimer);
  logoutTimer = setTimeout(autoLogout, 60000);
}

function autoLogout() {
  alert("You have been logged out due to inactivity.");
  localStorage.clear();
  window.location.href = "index.html";
}

window.onload = resetTimer;
document.onmousemove = resetTimer;
document.onkeypress = resetTimer;
document.onclick = resetTimer;
document.onscroll = resetTimer;

// Robust Dropdown Toggle
  const otherBtn = document.getElementById("otherBtn");
  const otherMenu = document.getElementById("otherMenu");

  otherBtn.onclick = function(e) {
    e.stopPropagation();
    otherMenu.classList.toggle("show");
  };

  // Close dropdown if user clicks outside
  window.onclick = function(event) {
    if (!event.target.matches('#otherBtn')) {
      if (otherMenu.classList.contains('show')) {
        otherMenu.classList.remove('show');
      }
    }
  };
</script>

</body>
</html>
