<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gas Bill JOS</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; padding: 20px; }
        .form-container { max-width: 400px; margin: auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #d35400; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        select, input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .btn { width: 100%; background: #e67e22; color: white; border: none; padding: 12px; margin-top: 20px; border-radius: 6px; cursor: pointer; font-size: 16px; }
        .status-msg { font-size: 12px; margin-top: 5px; display: block; }
        
        /* Popup Styles */
        .modal { display: none; position: fixed; z-index: 1; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 15% auto; padding: 20px; border-radius: 10px; width: 80%; max-width: 350px; text-align: center; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Gas Bill Payment</h2>
    
    <label>Provider</label>
    <select id="provider">
        <option value="Gujarat Gas">Gujarat Gas</option>
        <option value="Adani Gas">Adani Gas</option>
    </select>

    <label>Customer Number (CRN)</label>
    <input type="number" id="customerNo" placeholder="Enter CRN No" onblur="fetchDetails()">
    <span id="status" class="status-msg"></span>

    <label>Customer Name</label>
    <input type="text" id="customerName" placeholder="Enter Name" readonly>

    <label>Amount (₹)</label>
    <input type="number" id="amount" placeholder="0.00">

    <button class="btn" onclick="showPaymentPopup()">Generate Order & Pay</button>
</div>

<div id="payModal" class="modal">
    <div class="modal-content">
        <h3>Pay via UPI</h3>
        <p>ID: <b>9426959052-1@okbizaxis</b></p>
        <hr>
        <label>Upload Screenshot</label>
        <input type="file" id="ssUpload" accept="image/*">
        <button class="btn" onclick="processGasOrder()">Submit Payment</button>
        <button style="background:#7f8c8d" class="btn" onclick="closePopup()">Cancel</button>
    </div>
</div>

<script>
    // Using your existing Apps Script URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwbJ2ZREL8TVnv0Xazr-YDE9nmI7oGRBKrvvxDr3AZ3VGjiOqu0QHnD5JwmVMFv6nf_jw/exec";

    async function fetchDetails() {
        const no = document.getElementById("customerNo").value;
        const nameInput = document.getElementById("customerName");
        const status = document.getElementById("status");

        if (no.length < 5) return;

        status.innerText = "Searching Sheet...";
        status.style.color = "blue";

        try {
            // Reusing your getName logic to check Google Sheets
            const response = await fetch(`${SCRIPT_URL}?action=getName&custNo=${no}`);
            const data = await response.json();

            if (data.name) {
                nameInput.value = data.name;
                nameInput.readOnly = true;
                status.innerText = "Verified Customer";
                status.style.color = "green";
            } else {
                nameInput.value = "";
                nameInput.readOnly = false;
                nameInput.focus();
                status.innerText = "New Customer: Enter name to save";
                status.style.color = "orange";
            }
        } catch (e) {
            status.innerText = "Error connecting to Sheet";
        }
    }

    function showPaymentPopup() {
        const amt = document.getElementById("amount").value;
        if(!amt || amt <= 0) { alert("Please enter amount"); return; }
        document.getElementById("payModal").style.display = "block";
    }

    function closePopup() {
        document.getElementById("payModal").style.display = "none";
    }

    function processGasOrder() {
        const isNewCustomer = document.getElementById("customerName").readOnly === false;
        const fileInput = document.getElementById("ssUpload");

        if (fileInput.files.length === 0) {
            alert("Please upload payment screenshot first");
            return;
        }

        const orderData = {
            orderType: "GAS",
            orderNo: "GB" + Date.now(),
            provider: document.getElementById("provider").value,
            customerNo: document.getElementById("customerNo").value,
            customerName: document.getElementById("customerName").value,
            amount: document.getElementById("amount").value,
            isNew: isNewCustomer 
        };
        
        // Store in session and proceed to your processing logic
        sessionStorage.setItem("currentGasOrder", JSON.stringify(orderData));
        alert("Order Submitted! Data will be saved to Google Sheets.");
        window.location.reload(); 
    }
</script>
</body>
</html>
