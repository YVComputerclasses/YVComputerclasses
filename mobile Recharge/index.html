<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="logo.png">
  <title>Recharge Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-container {
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      width: 350px;
      text-align: center;
    }

    .login-container h2 {
      margin-bottom: 20px;
      color: #333;
    }

    .form-group {
      margin-bottom: 15px;
      text-align: left;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      color: #555;
    }

    .form-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      border-color: #4facfe;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: #4facfe;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .btn:hover {
      background: #00c6fb;
    }

    .message {
      margin-top: 15px;
      font-size: 14px;
      color: red;
    }
  </style>
</head>
<body>
  <div class="login-container">
  <h2 id="loginHeader">Login</h2>
  <form id="loginForm">
    <div id="step1">
      <div class="form-group">
        <label for="userid">User ID</label>
        <input type="text" id="userid" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required>
      </div>
      <button type="button" class="btn" onclick="handleStep1()">Send OTP</button>
    </div>

    <div id="step2" style="display: none;">
      <div class="form-group">
        <label for="otp">Enter 4-Digit OTP</label>
        <input type="text" id="otp" maxlength="4" placeholder="0000" style="text-align: center; letter-spacing: 10px; font-size: 20px;">
      </div>
      <button type="submit" class="btn">Verify & Login</button>
      <button type="button" class="btn" style="background:#666; margin-top:5px;" onclick="location.reload()">Back</button>
    </div>

    <div class="message" id="message"></div>
  </form>
</div>

  <script>
    // Example multiuser data: userid → {password, email}
    const users = {
      "62021030": { password: "megh2010", email: "mp1997927@gmail.com", permissions: ["mobile", "electricity"] },
      "62023090": { password: "vishal2001", email: "vishalraval3931@gmail.com" , permissions: ["mobile"] }
      // add more users here
    };

    let generatedOTP = null; // Variable to store the 4-digit session code

    const form = document.getElementById("loginForm");
    const message = document.getElementById("message");

    // Function to handle Password Validation
function handleStep1() {
  const userid = document.getElementById("userid").value.trim();
  const pass = document.getElementById("password").value.trim();
  const message = document.getElementById("message");

  if (users[userid] && users[userid].password === pass) {
    // 1. Generate 4-digit OTP (Between 1000 and 9999)
    generatedOTP = Math.floor(1000 + Math.random() * 9000).toString();
    
    // 2. Simulate sending (Alert the user)
    alert("Your 4-digit OTP is: " + generatedOTP);
    
    // 3. Switch UI steps
    document.getElementById("step1").style.display = "none";
    document.getElementById("step2").style.display = "block";
    document.getElementById("loginHeader").textContent = "OTP Verification";
    message.textContent = "";
  } else {
    message.style.color = "red";
    message.textContent = "Invalid User ID or Password ❌";
  }
}

// Function to handle Final Login (OTP Check)
document.getElementById("loginForm").addEventListener("submit", function(e) {
  e.preventDefault();
  const userid = document.getElementById("userid").value.trim();
  const userEnteredOtp = document.getElementById("otp").value.trim();
  const message = document.getElementById("message");

  if (userEnteredOtp === generatedOTP) {
    // Save session data to localStorage (required for dashboard.html)
    localStorage.setItem("userid", userid);
    localStorage.setItem("email", users[userid].email);
    localStorage.setItem("permissions", JSON.stringify(users[userid].permissions));

    message.style.color = "green";
    message.textContent = "OTP Verified! Redirecting...";

    setTimeout(() => {
      window.location.href = "dashboard.html";
    }, 1000);
  } else {
    message.style.color = "red";
    message.textContent = "Invalid OTP. Please try again. ❌";
  }
});
