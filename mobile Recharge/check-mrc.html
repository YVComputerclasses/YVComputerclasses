<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="logo.png">
  <title>Check MRC - JOS Portal</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f4f6f9; }
    
    /* Navbar Styles */
    .navbar { display: flex; justify-content: space-between; align-items: center; background: #2c3e50; padding: 10px 20px; color: #fff; }
    .nav-left { display: flex; gap: 20px; list-style: none; padding: 0; margin: 0; align-items: center; }
    .nav-left li { position: relative; }
    .nav-left a { text-decoration: none; color: #fff; font-weight: bold; transition: color 0.3s; }
    .nav-left a:hover { color: #1abc9c; }
    
    .nav-right { position: relative; }
    .user-btn { background: #1abc9c; border: none; color: #fff; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }

    /* Unified Dropdown Style for both Left and Right */
    .dropdown { 
      display: none; 
      position: absolute; 
      background: #fff; 
      min-width: 150px; 
      box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
      z-index: 1000; 
      border-radius: 4px; 
      top: 100%;
    }
    #otherMenu { left: 0; margin-top: 10px; }
    #dropdownMenu { right: 0; margin-top: 5px; }

    .dropdown a { color: #333; padding: 10px 15px; text-decoration: none; display: block; font-size: 14px; font-weight: normal; }
    .dropdown a:hover { background: #f1f1f1; color: #1abc9c; }
    .show { display: block; }

    /* Page Content */
    .container { max-width: 900px; margin: 40px auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
    .input-box { max-width: 450px; margin: 0 auto 25px auto; text-align: left; }
    input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
    .btn-check { background: #1abc9c; color: white; border: none; padding: 14px; width: 100%; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 15px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
    th { background: #2c3e50; color: white; }
    .status-expired { color: white; background: #e74c3c; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
  </style>
</head>
<body>

  <nav class="navbar">
    <ul class="nav-left">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="service.html">Service</a></li>
      <li><a href="history.html">History</a></li>
      <li><a href="commission.html">Commission</a></li>
      <li>
        <a href="javascript:void(0)" id="otherBtn">Other ▼</a>
        <div class="dropdown" id="otherMenu">
          <a href="payout.html">Payout</a>
          <a href="check-mrc.html">Check MRC</a>
          <a href="#" onclick="alert('Support: Contact Admin')">Complain</a>
        </div>
      </li>
    </ul>

    <div class="nav-right">
      <button class="user-btn" id="userBtn">UserID ▼</button>
      <div class="dropdown" id="dropdownMenu">
        <a href="#" id="logout">Logout</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <h2>Check Mobile Recharge Code (MRC)</h2>
    <div class="input-box">
      <input type="text" id="mrcInput" placeholder="Ex: JOS12345678">
      <button class="btn-check" onclick="checkMRC()">Check Now</button>
    </div>
    <div id="resultContainer" style="display:none; overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Code</th>
            <th>Mobile</th>
            <th>Amount</th>
            <th>Discount</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="resultBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    // --- SECURITY & UI LOGIC ---
    const currentUserId = localStorage.getItem("userid");
    if (!currentUserId) { window.location.href = "index.html"; }
    document.getElementById("userBtn").innerText = currentUserId + " ▼";

    // Toggle Other Menu
    const otherBtn = document.getElementById("otherBtn");
    const otherMenu = document.getElementById("otherMenu");
    otherBtn.onclick = (e) => {
        e.stopPropagation();
        otherMenu.classList.toggle("show");
        dropdownMenu.classList.remove("show");
    };

    // Toggle User Menu
    const userBtn = document.getElementById("userBtn");
    const dropdownMenu = document.getElementById("dropdownMenu");
    userBtn.onclick = (e) => {
        e.stopPropagation();
        dropdownMenu.classList.toggle("show");
        otherMenu.classList.remove("show");
    };

    // Logout
    document.getElementById("logout").onclick = () => {
        localStorage.clear();
        window.location.href = "index.html";
    };

    window.onclick = () => {
        otherMenu.classList.remove("show");
        dropdownMenu.classList.remove("show");
    };

    // --- MRC DATA LOGIC ---
    async function checkMRC() {
      const input = document.getElementById("mrcInput").value.trim();
      const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRrFWy4RnzVA_eu2Yb8JaQh2v5hFLzLeEVmfwqZnZJoekOwuSjPKIkkex0VymksfNpe2K5YHozKUGot/pub?gid=0&single=true&output=csv";
      
      try {
        const res = await fetch(SHEET_URL + "&t=" + new Date().getTime());
        const data = await res.text();
        const rows = data.split("\n").slice(1);
        const tbody = document.getElementById("resultBody");
        tbody.innerHTML = "";
        let found = false;
        const today = new Date(); today.setHours(0,0,0,0);

        rows.forEach(row => {
          const cols = row.split(",");
          if(cols[2] && cols[2].trim() === input) {
            found = true;
            const parts = cols[8].trim().split('-');
            const expDate = new Date(parts[2], parts[1]-1, parts[0]);
            let status = (expDate < today) ? `<span class="status-expired">EXPIRED ❌</span>` : `<span style="color:green; font-weight:bold;">${cols[8]} ✅</span>`;
            tbody.innerHTML += `<tr><td>${cols[1]}</td><td>${cols[2]}</td><td>${cols[3]}</td><td>₹${cols[4]}</td><td>${cols[7]}</td><td>${status}</td></tr>`;
          }
        });
        document.getElementById("resultContainer").style.display = found ? "block" : "none";
        if(!found) alert("Code not found.");
      } catch(e) { alert("Fetch error"); }
    }
  </script>
</body>
</html>
